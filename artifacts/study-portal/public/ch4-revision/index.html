<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Revision Notes — 4 | Alone 12th</title>
  <script>
    (function(){
      var t=localStorage.getItem('sp-theme');
      if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f7f8fc;--surface:#ffffff;--navy:#1a1a2e;
      --border:#e2e6f0;--text:#1e1e2e;--muted:#6b7280;--sub:#9ca3af;
      --card-bg:#ffffff;--card-border:#e2e6f0;
      --cover-bg:#1a1a2e;--icon-bg:#f0f2f8;--icon-color:#2d4a8a;
    }
    html.dark{
      --bg:#0f0f1a;--surface:#1a1a2e;
      --border:#2a2a45;--text:#e8e8f0;--muted:#9ca3af;--sub:#6b7280;
      --card-bg:#1e1e35;--card-border:#2a2a45;
      --cover-bg:#0a0a18;--icon-bg:#252545;--icon-color:#a5b4fc;
    }
    body{font-family:'Segoe UI','Noto Sans Devanagari',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .page{max-width:600px;margin:0 auto;background:var(--surface);min-height:100vh;box-shadow:0 2px 32px rgba(0,0,0,.1)}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:10}
    .topbar-inner{display:flex;align-items:center;justify-content:space-between;height:50px}
    .back-btn{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted);text-decoration:none;font-weight:600}
    .back-btn svg{width:16px;height:16px}
    .topbar-title{font-size:.8rem;font-weight:700;color:var(--text)}
    .cover{background:var(--cover-bg);color:#fff;padding:28px 20px 24px}
    .cover-tag{font-size:.6rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:7px}
    .cover h1{font-size:1.4rem;font-weight:800;line-height:1.25;margin-bottom:5px;color:#fff}
    .cover .meta{font-size:.72rem;color:rgba(255,255,255,.35);display:flex;gap:8px}
    .cards{padding:14px 14px 28px;display:flex;flex-direction:column;gap:8px}
    .card{display:flex;align-items:center;gap:13px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:14px 16px;text-decoration:none;color:inherit}
    .icon-wrap{width:38px;height:38px;border-radius:9px;background:var(--icon-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--icon-color)}
    .icon-wrap svg{width:18px;height:18px}
    .card-title{flex:1;font-size:.9rem;font-weight:700;color:var(--text)}
    .arrow{width:16px;height:16px;color:var(--sub);flex-shrink:0}
  </style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="back-btn" href="javascript:history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </a>
      <span class="topbar-title">Ch 4 · Revision Notes</span>
      <span style="width:52px"></span>
    </div>
  </div>
  <div class="cover">

    <h1>सारणिक</h1>
    <div class="meta"><span>बिहार बोर्ड</span><span>·</span><span>कक्षा 12</span><span>·</span><span>Maths</span></div>
  </div>
  <div class="cards">
    <a class="card" href="01-concepts.html">
      <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="13" y2="11"/></svg></div>
      <div class="card-title">Concepts + Formulas</div>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>
    <a class="card" href="02-mistakes.html">
      <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <div class="card-title">Common Mistakes</div>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>
    <a class="card" href="04-formula-sheet.html">
      <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg></div>
      <div class="card-title">Formula Sheet</div>
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>
  </div>
</div>
</body>
</html>
