kind = "web"
previewPath = "/study/"
title = "Alone 12th"
version = "1.0.0"
id = "artifacts/study-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/study/" ]
localPort = 25108

[services.development]
run = "pnpm --filter @workspace/study-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-portal", "run", "build" ]
publicDir = "artifacts/study-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25108"
BASE_PATH = "/study/"
