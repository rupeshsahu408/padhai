services:
  - type: web
    name: alone-12th
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/study-portal run build
    staticPublishPath: artifacts/study-portal/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
